<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridexx Planet | Luxury Bridal Atelier</title>
    <script>
      // Prevent libraries from trying to override window.fetch if it's a non-writable property
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: () => originalFetch,
              set: (v) => { console.warn('Blocked attempt to override window.fetch'); },
              configurable: true
            });
          }
        } catch (e) {
          console.warn('Failed to define fetch protector:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
